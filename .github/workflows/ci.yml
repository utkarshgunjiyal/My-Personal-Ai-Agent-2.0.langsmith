name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/backend"
    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest httpx
      - name: Run unit tests (retrieval)
        run: pytest tests/test_retrieval.py -v
      - name: Boot backend
        env:
          MONGO_URL: "mongodb://localhost:27017"
          DB_NAME: "ci_test"
          JWT_SECRET: "ci-secret-${{ github.run_id }}"
          EMERGENT_LLM_KEY: "dummy-key-for-routes-only"
          ADMIN_EMAIL: "admin@ci.dev"
          ADMIN_PASSWORD: "ci123456"
          FRONTEND_URL: "http://localhost:3000"
        run: |
          cd backend
          nohup uvicorn server:app --host 0.0.0.0 --port 8001 &
          sleep 6
      - name: Run smoke tests
        env:
          E2E_BACKEND_URL: "http://localhost:8001"
        run: pytest tests/test_api.py -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: "http://localhost:8001"
          CI: "true"
        run: npm run build