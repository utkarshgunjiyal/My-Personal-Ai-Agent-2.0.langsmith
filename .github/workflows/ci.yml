name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest httpx

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          FAISS_DIR: ${{ runner.temp }}/faiss
        run: |
          mkdir -p "${{ runner.temp }}/faiss"
          python -m pytest tests/test_retrieval.py -v

      - name: Boot backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: ci_test
          JWT_SECRET: ci-secret-${{ github.run_id }}
          OPENAI_API_KEY: dummy-key-for-routes-only
          OPENROUTER_API_KEY: dummy-key-for-routes-only
          OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
          LLM_PROVIDER: openai
          LLM_MODEL: gpt-4o-mini
          FAISS_DIR: ${{ runner.temp }}/faiss
          ADMIN_EMAIL: admin@ci.dev
          ADMIN_PASSWORD: ci123456
          FRONTEND_URL: http://localhost:3000
        run: |
          mkdir -p "${{ runner.temp }}/faiss"
          cd backend
          nohup python -m uvicorn server:app \
            --host 0.0.0.0 \
            --port 8001 \
            > /tmp/backend.log 2>&1 &

          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:8001/docs >/dev/null; then
              echo "Backend started successfully"
              exit 0
            fi
            sleep 1
          done

          echo "Backend failed to start"
          cat /tmp/backend.log
          exit 1

      - name: Run smoke tests
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          E2E_BACKEND_URL: http://localhost:8001
          FAISS_DIR: ${{ runner.temp }}/faiss
        run: python -m pytest tests/test_api.py -v

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: http://localhost:8001
          CI: "false"
        run: npm run build
