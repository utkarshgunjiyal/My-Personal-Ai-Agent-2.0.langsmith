name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/backend
      FAISS_DIR: ${{ runner.temp }}/faiss

    services:
      mongo:
        image: mongo:7
        ports:
          - "27017:27017"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest httpx

      - name: Prepare writable FAISS directory
        run: mkdir -p "$FAISS_DIR"

      - name: Run retrieval unit tests
        run: python -m pytest tests/test_retrieval.py -v

      - name: Boot backend
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: ci_test
          JWT_SECRET: ci-secret-${{ github.run_id }}
          OPENAI_API_KEY: dummy-key-for-routes-only
          OPENROUTER_API_KEY: dummy-key-for-routes-only
          LLM_PROVIDER: openai
          LLM_MODEL: gpt-4o-mini
          ADMIN_EMAIL: admin@ci.dev
          ADMIN_PASSWORD: ci123456
          FRONTEND_URL: http://localhost:3000
          LANGSMITH_TRACING: "false"
        run: |
          cd backend
          nohup python -m uvicorn server:app --host 0.0.0.0 --port 8001 > /tmp/backend.log 2>&1 &

          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:8001/api/health >/dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 1
          done

          echo "Backend failed to become ready"
          cat /tmp/backend.log
          exit 1

      - name: Run API smoke tests
        env:
          E2E_BACKEND_URL: http://localhost:8001
        run: python -m pytest tests/test_api.py -v

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: http://localhost:8001
          # The current source has a non-fatal React Hooks lint warning.
          # CRA promotes warnings to errors when CI=true.
          CI: "false"
        run: npm run build
